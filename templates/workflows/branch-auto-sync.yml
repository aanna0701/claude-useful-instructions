# Branch Auto-Sync — hub-and-spoke merge workflow
# Reads .claude/branch-map.yaml; branches: section optional.
# Install: copy to .github/workflows/ (with scripts/ alongside)

name: Branch Auto-Sync

on:
  push:
    branches:
      # ── Customize: list your feature/integration branches ──
      - feature-*
      - feat/*

permissions:
  contents: write

jobs:
  hub-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Parse branch-map and sync
        run: |
          git fetch --all --prune
          TRIGGER="${GITHUB_REF#refs/heads/}"
          BRANCH_MAP=".claude/branch-map.yaml"
          PARSER=".github/workflows/scripts/parse-branch-map.py"
          FAILED=""

          echo "Trigger branch: $TRIGGER"
          echo "========================================"

          merge_into() {
            local SOURCE=$1 TARGET=$2 MSG=$3
            echo ""
            echo "=== $SOURCE → $TARGET ==="

            if ! git rev-parse "origin/$TARGET" &>/dev/null; then
              echo "SKIP: $TARGET does not exist on remote"
              return 0
            fi

            git checkout "$TARGET"
            git reset --hard "origin/$TARGET"

            if git merge "origin/$SOURCE" --no-edit -m "$MSG"; then
              git push origin "$TARGET"
              echo "OK: $TARGET updated"
            else
              echo "CONFLICT: $TARGET — skipping (needs manual merge)"
              git merge --abort
              FAILED="$FAILED $TARGET"
              return 1
            fi
          }

          # ── Phase 1: Merge UP (feature → hub) ──
          if [ -f "$BRANCH_MAP" ]; then
            HUB=$(python3 "$PARSER" merge-target "$BRANCH_MAP" "$TRIGGER")
          else
            echo "WARNING: $BRANCH_MAP not found, skipping"
            HUB=""
          fi

          if [ -n "$HUB" ] && [ "$TRIGGER" != "$HUB" ]; then
            echo ""
            echo "──── Phase 1: Merge UP ($TRIGGER → $HUB) ────"
            merge_into "$TRIGGER" "$HUB" \
              "chore: auto-sync $TRIGGER into $HUB" || true
          fi

          # ── Phase 2: Cascade DOWN (hub → children → grandchildren) ──
          SYNC_SOURCE="${HUB:-$TRIGGER}"
          CHILDREN=$(python3 "$PARSER" children "$BRANCH_MAP" "$TRIGGER" "$SYNC_SOURCE" 2>/dev/null || echo "")

          if [ -n "$CHILDREN" ]; then
            echo ""
            echo "──── Phase 2: Cascade DOWN ($SYNC_SOURCE → children) ────"
            for CHILD in $CHILDREN; do
              merge_into "$SYNC_SOURCE" "$CHILD" \
                "chore: auto-sync from $SYNC_SOURCE" || true
            done

            # Depth 2: grandchildren (explicit only)
            if [ -f "$BRANCH_MAP" ]; then
              for CHILD in $CHILDREN; do
                GRANDCHILDREN=$(python3 "$PARSER" grandchildren "$BRANCH_MAP" "$TRIGGER" "$CHILD" 2>/dev/null || echo "")
                for GC in $GRANDCHILDREN; do
                  merge_into "$CHILD" "$GC" \
                    "chore: cascade from $SYNC_SOURCE via $CHILD" || true
                done
              done
            fi
          fi

          echo ""
          echo "========================================"
          if [ -n "$FAILED" ]; then
            echo "::warning::Failed branches:$FAILED"
          else
            echo "All syncs completed successfully."
          fi
