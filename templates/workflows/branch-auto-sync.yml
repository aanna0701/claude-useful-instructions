# Branch Auto-Sync — hub-and-spoke merge workflow
# Hub branch is read from the PR's base branch (set by guard-branch hook at worktree creation).
# No branch-map.yaml required.
# Install: copy to .github/workflows/

name: Branch Auto-Sync

on:
  push:
    branches:
      - feature-*
      - feat/*

permissions:
  contents: write

jobs:
  hub-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync branches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch --all --prune
          TRIGGER="${GITHUB_REF#refs/heads/}"
          FAILED=""

          echo "Trigger branch: $TRIGGER"
          echo "========================================"

          merge_into() {
            local SOURCE=$1 TARGET=$2 MSG=$3
            echo ""
            echo "=== $SOURCE → $TARGET ==="

            if ! git rev-parse "origin/$TARGET" &>/dev/null; then
              echo "SKIP: $TARGET does not exist on remote"
              return 0
            fi

            git checkout "$TARGET"
            git reset --hard "origin/$TARGET"

            if git merge "origin/$SOURCE" --no-edit -m "$MSG"; then
              git push origin "$TARGET"
              echo "OK: $TARGET updated"
            else
              echo "CONFLICT: $TARGET — skipping (needs manual merge)"
              git merge --abort
              FAILED="$FAILED $TARGET"
              return 1
            fi
          }

          # ── Phase 1: Merge UP (feature → hub) ──
          # Hub is read from the PR's base branch (set by guard-branch hook at worktree creation).
          HUB=$(gh pr list --head "$TRIGGER" --state open --json baseRefName -q '.[0].baseRefName' 2>/dev/null || echo "")

          if [ -n "$HUB" ] && [ "$TRIGGER" != "$HUB" ]; then
            echo ""
            echo "──── Phase 1: Merge UP ($TRIGGER → $HUB) ────"
            merge_into "$TRIGGER" "$HUB" \
              "chore: auto-sync $TRIGGER into $HUB" || true
          else
            echo "Phase 1: skipped (no open PR found for $TRIGGER, or trigger is already hub)"
            HUB="$TRIGGER"
          fi

          # ── Phase 2: Cascade DOWN (hub → all other feature branches) ──
          SYNC_SOURCE="${HUB}"
          echo ""
          echo "──── Phase 2: Cascade DOWN from $SYNC_SOURCE ────"

          # Auto-detect all remote feature branches except the trigger and hub itself
          CHILDREN=$(git branch -r --format='%(refname:short)' \
            | grep -E '^origin/(feature-|feat/)' \
            | sed 's|^origin/||' \
            | grep -v "^$TRIGGER$" \
            | grep -v "^$SYNC_SOURCE$" \
            || true)

          if [ -n "$CHILDREN" ]; then
            for CHILD in $CHILDREN; do
              merge_into "$SYNC_SOURCE" "$CHILD" \
                "chore: auto-sync from $SYNC_SOURCE" || true
            done
          else
            echo "No child branches to cascade to."
          fi

          echo ""
          echo "========================================"
          if [ -n "$FAILED" ]; then
            echo "::warning::Failed branches:$FAILED"
          else
            echo "All syncs completed successfully."
          fi
