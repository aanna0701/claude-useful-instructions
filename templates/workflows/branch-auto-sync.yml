# Branch Auto-Sync — cascade hub updates DOWN to feature children.
#
# Policy: merges into any branch are only permitted via an approved PR
# (/work-review → gh pr merge --squash). This workflow therefore NEVER
# merges feature branches upward. It only propagates an already-merged
# hub state DOWN into in-progress feature branches so they stay fresh.
#
# Trigger: a PR merge into a hub branch (main, develop, research, or any
# feature-* branch acting as a hub). The merged base is the SYNC_SOURCE;
# every open PR whose base is SYNC_SOURCE receives the update via merge.
#
# Install: copy to .github/workflows/

name: Branch Auto-Sync

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: read

jobs:
  cascade-down:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Cascade hub -> children
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SYNC_SOURCE: ${{ github.event.pull_request.base.ref }}
          REPO: ${{ github.repository }}
        run: |
          set -u
          git fetch --all --prune

          echo "Sync source (merged base): $SYNC_SOURCE"
          echo "========================================"

          # Children = open PRs whose base is SYNC_SOURCE.
          # Limiting to open-PR heads avoids touching abandoned branches
          # and avoids cascading into merged siblings.
          CHILDREN=$(gh pr list \
            --repo "$REPO" \
            --base "$SYNC_SOURCE" \
            --state open \
            --json headRefName \
            --jq '.[].headRefName')

          if [ -z "$CHILDREN" ]; then
            echo "No open child PRs targeting $SYNC_SOURCE."
            exit 0
          fi

          FAILED=""
          for CHILD in $CHILDREN; do
            echo ""
            echo "=== $SYNC_SOURCE -> $CHILD ==="

            if ! git rev-parse "origin/$CHILD" &>/dev/null; then
              echo "SKIP: $CHILD not on remote"
              continue
            fi

            git checkout "$CHILD"
            git reset --hard "origin/$CHILD"

            if git merge "origin/$SYNC_SOURCE" --no-edit \
                 -m "chore: auto-sync from $SYNC_SOURCE"; then
              git push origin "$CHILD"
              echo "OK: $CHILD updated"
            else
              echo "CONFLICT: $CHILD - needs manual resolution"
              git merge --abort
              FAILED="$FAILED $CHILD"
            fi
          done

          echo ""
          echo "========================================"
          if [ -n "$FAILED" ]; then
            echo "::warning::Conflicts on:$FAILED"
          else
            echo "Cascade completed."
          fi
