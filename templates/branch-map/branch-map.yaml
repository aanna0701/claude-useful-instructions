# Branch Map — project branch hierarchy and routing config
# Location: .claude/branch-map.yaml (auto-generated by /branch-init)
#
# Edit this file to match your project's branching model.
# Claude reads this before creating branches, merging, or routing work items.

version: 1

# Branch hierarchy: ordered from trunk to working parent
# Claude derives merge targets from this chain.
trunk_chain:
  - main
  # - develop        # uncomment if you use a develop branch
  # - research       # uncomment for deeper chains

# The branch that feature branches are based on.
# Must be the last entry in trunk_chain.
working_parent: main

# Branch naming
branch_rules:
  feature_prefix: feat    # feat/FEAT-001-slug
  default_merge_target: main  # must match working_parent

# Role-to-path mapping for worktree routing (optional, collab workflow only)
# Uncomment and customize roles relevant to your project.
# roles:
#   docs:
#     preferred_worktree: Project-Docs
#     paths: [docs/**, adr/**, specs/**, README.md]
#   backend:
#     preferred_worktree: Project-Backend
#     paths: [src/**, lib/**, tests/**]
#   frontend:
#     preferred_worktree: Project-UI
#     paths: [web/**, ui/**, app/**]
#   infra:
#     preferred_worktree: Project-Infra
#     paths: [.github/**, infra/**, deploy/**, scripts/**]

# Merge policy
merge_policy:
  require_parent_freshness: true   # branch must be up-to-date with parent before merge
  require_green_ci: true           # CI checks must pass before merge
  ask_confirm_before_merge: true   # ask user before executing merge
  delete_branch_after_merge: true  # clean up feature branch after merge
