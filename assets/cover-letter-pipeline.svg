<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 980" width="760" height="980" font-family="'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="760" height="980" fill="#f8fafc" rx="16"/>

  <!-- ─────────────────────────────────── -->
  <!-- STAGE 1 -->
  <!-- ─────────────────────────────────── -->
  <rect x="30" y="24" width="700" height="246" rx="14" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" filter="url(#shadow)"/>
  <!-- Stage badge -->
  <rect x="48" y="38" width="180" height="28" rx="8" fill="#3b82f6"/>
  <text x="138" y="57" text-anchor="middle" fill="white" font-size="13" font-weight="700">Stage 1: 컨텍스트 추출</text>
  <!-- Stage subtitle -->
  <text x="380" y="57" text-anchor="middle" fill="#1e40af" font-size="12">NotebookLM "자소서" 노트북에서 정보 추출</text>

  <!-- Input sources row -->
  <!-- CV -->
  <rect x="48" y="82" width="192" height="54" rx="10" fill="white" stroke="#bfdbfe" stroke-width="1"/>
  <text x="76" y="103" fill="#6b7280" font-size="11">📄</text>
  <text x="94" y="103" fill="#1e3a8a" font-size="12" font-weight="600">CV / 이력서</text>
  <rect x="152" y="92" width="80" height="20" rx="6" fill="#dbeafe"/>
  <text x="192" y="106" text-anchor="middle" fill="#2563eb" font-size="10" font-weight="500">NotebookLM</text>
  <text x="76" y="122" fill="#64748b" font-size="11">이력서, 경력 사항</text>

  <!-- Portfolio -->
  <rect x="252" y="82" width="192" height="54" rx="10" fill="white" stroke="#bfdbfe" stroke-width="1"/>
  <text x="280" y="103" fill="#6b7280" font-size="11">🗂</text>
  <text x="298" y="103" fill="#1e3a8a" font-size="12" font-weight="600">포트폴리오</text>
  <rect x="360" y="92" width="80" height="20" rx="6" fill="#dbeafe"/>
  <text x="400" y="106" text-anchor="middle" fill="#2563eb" font-size="10" font-weight="500">NotebookLM</text>
  <text x="280" y="122" fill="#64748b" font-size="11">프로젝트 포트폴리오</text>

  <!-- Paper -->
  <rect x="456" y="82" width="246" height="54" rx="10" fill="white" stroke="#bfdbfe" stroke-width="1"/>
  <text x="484" y="103" fill="#6b7280" font-size="11">📑</text>
  <text x="502" y="103" fill="#1e3a8a" font-size="12" font-weight="600">프로젝트 기술서 / 논문</text>
  <rect x="590" y="92" width="80" height="20" rx="6" fill="#dbeafe"/>
  <text x="630" y="106" text-anchor="middle" fill="#2563eb" font-size="10" font-weight="500">NotebookLM</text>
  <text x="484" y="122" fill="#64748b" font-size="11">상세 기술 문서</text>

  <!-- Down arrows from sources -->
  <line x1="144" y1="136" x2="144" y2="162" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="348" y1="136" x2="348" y2="162" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="579" y1="136" x2="579" y2="162" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Output box -->
  <rect x="48" y="164" width="664" height="50" rx="10" fill="#1d4ed8" />
  <text x="380" y="186" text-anchor="middle" fill="white" font-size="13" font-weight="600">📋 컨텍스트_정리_YYYYMMDD_HHMM.md</text>
  <text x="380" y="204" text-anchor="middle" fill="#bfdbfe" font-size="11">기술스택 · 프로젝트 경험 · 성과 · 경력 타임라인 · 강점 포인트  →  NLM에 업로드</text>

  <!-- ─────────────────────────────────── -->
  <!-- Arrow Stage 1 → Stage 2 -->
  <!-- ─────────────────────────────────── -->
  <line x1="380" y1="270" x2="380" y2="302" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ─────────────────────────────────── -->
  <!-- STAGE 2 -->
  <!-- ─────────────────────────────────── -->
  <rect x="30" y="304" width="700" height="212" rx="14" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="48" y="318" width="210" height="28" rx="8" fill="#16a34a"/>
  <text x="153" y="337" text-anchor="middle" fill="white" font-size="13" font-weight="700">Stage 2: 경력 기술서 &amp; 에세이</text>
  <text x="410" y="337" text-anchor="middle" fill="#166534" font-size="12">컨텍스트 기반 서류 생성</text>

  <!-- Doc 1 -->
  <rect x="48" y="360" width="322" height="126" rx="10" fill="white" stroke="#bbf7d0" stroke-width="1"/>
  <rect x="48" y="360" width="322" height="32" rx="10" fill="#dcfce7"/>
  <rect x="48" y="380" width="322" height="12" rx="0" fill="#dcfce7"/>
  <text x="209" y="381" text-anchor="middle" fill="#15803d" font-size="12" font-weight="700">📄 상세 경력 기술서</text>
  <text x="68" y="410" fill="#374151" font-size="11">• 회사별 연도순 정리 (oldest → newest)</text>
  <text x="68" y="428" fill="#374151" font-size="11">• 프로젝트별 역할 · 기술 · 수치 성과</text>
  <text x="68" y="446" fill="#374151" font-size="11">• 본인 기여 구체화, 팀 성과와 분리</text>
  <text x="68" y="464" fill="#374151" font-size="11">• 기술 깊이를 보여주는 세부 정보</text>

  <!-- Doc 2 -->
  <rect x="386" y="360" width="326" height="126" rx="10" fill="white" stroke="#bbf7d0" stroke-width="1"/>
  <rect x="386" y="360" width="326" height="32" rx="10" fill="#dcfce7"/>
  <rect x="386" y="380" width="326" height="12" rx="0" fill="#dcfce7"/>
  <text x="549" y="381" text-anchor="middle" fill="#15803d" font-size="12" font-weight="700">📝 인사 관점 에세이</text>
  <text x="406" y="410" fill="#374151" font-size="11">• 협업 경험 (디자이너, PM, 비즈니스)</text>
  <text x="406" y="428" fill="#374151" font-size="11">• 리더십 &amp; 멘토링</text>
  <text x="406" y="446" fill="#374151" font-size="11">• 문제 해결 패턴 · 갈등 해결</text>
  <text x="406" y="464" fill="#374151" font-size="11">• 에세이 형식 산문 (800-1500자)</text>

  <!-- Upload bar -->
  <rect x="48" y="494" width="664" height="8" rx="4" fill="#16a34a" opacity="0.2"/>
  <text x="380" y="506" text-anchor="middle" fill="#15803d" font-size="11" font-weight="500">확인 후 NotebookLM "자소서" 노트북에 업로드</text>

  <!-- ─────────────────────────────────── -->
  <!-- Arrow Stage 2 → Stage 3 -->
  <!-- ─────────────────────────────────── -->
  <line x1="380" y1="516" x2="380" y2="548" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ─────────────────────────────────── -->
  <!-- STAGE 3 -->
  <!-- ─────────────────────────────────── -->
  <rect x="30" y="550" width="700" height="392" rx="14" fill="#fdf4ff" stroke="#e9d5ff" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="48" y="564" width="264" height="28" rx="8" fill="#7c3aed"/>
  <text x="180" y="583" text-anchor="middle" fill="white" font-size="13" font-weight="700">Stage 3: 자소서 작성 (멀티 에이전트)</text>

  <!-- Input pills row -->
  <text x="48" y="614" fill="#6b21a8" font-size="11" font-weight="600">입력 정보</text>
  <rect x="48" y="622" width="110" height="24" rx="6" fill="#ede9fe"/>
  <text x="103" y="638" text-anchor="middle" fill="#5b21b6" font-size="11">📝 자소서 항목</text>
  <rect x="166" y="622" width="66" height="24" rx="6" fill="#ede9fe"/>
  <text x="199" y="638" text-anchor="middle" fill="#5b21b6" font-size="11">💼 JD</text>
  <rect x="240" y="622" width="90" height="24" rx="6" fill="#ede9fe"/>
  <text x="285" y="638" text-anchor="middle" fill="#5b21b6" font-size="11">⭐ 강조 사항</text>
  <rect x="338" y="622" width="98" height="24" rx="6" fill="#ede9fe"/>
  <text x="387" y="638" text-anchor="middle" fill="#5b21b6" font-size="11">📏 글자수 제한</text>
  <rect x="444" y="622" width="120" height="24" rx="6" fill="#fae8ff" stroke="#d8b4fe" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="504" y="638" text-anchor="middle" fill="#7c3aed" font-size="11">✏️ 사용자 초안 (선택)</text>

  <!-- Mode row -->
  <text x="48" y="674" fill="#6b21a8" font-size="11" font-weight="600">작성 모드</text>
  <rect x="48" y="682" width="198" height="24" rx="6" fill="#f3f4f6"/>
  <text x="147" y="698" text-anchor="middle" fill="#374151" font-size="11">Mode A: 처음부터 작성</text>
  <rect x="254" y="682" width="216" height="24" rx="6" fill="#f3f4f6"/>
  <text x="362" y="698" text-anchor="middle" fill="#374151" font-size="11">Mode B: 사용자 초안 개선</text>
  <rect x="478" y="682" width="236" height="24" rx="6" fill="#f3f4f6"/>
  <text x="596" y="698" text-anchor="middle" fill="#374151" font-size="11">Mode C: 이전 결과 수정 후 재시작</text>

  <!-- Arrow down to loop -->
  <line x1="380" y1="706" x2="380" y2="730" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Writer box -->
  <rect x="48" y="732" width="290" height="100" rx="12" fill="white" stroke="#c4b5fd" stroke-width="1.5"/>
  <rect x="48" y="732" width="290" height="34" rx="12" fill="#7c3aed"/>
  <rect x="48" y="752" width="290" height="14" rx="0" fill="#7c3aed"/>
  <text x="193" y="754" text-anchor="middle" fill="white" font-size="13" font-weight="700">✏️ Writer 에이전트</text>
  <text x="68" y="782" fill="#374151" font-size="11">• Stage 2 경력 기술서 + 에세이 1차 소스</text>
  <text x="68" y="798" fill="#374151" font-size="11">• JD 분석 → 경험 매핑</text>
  <text x="68" y="814" fill="#374151" font-size="11">• 기승전결 구조 · 경력직 전문 톤</text>

  <!-- Arrow Writer → Reviewer -->
  <line x1="338" y1="782" x2="408" y2="782" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="373" y="775" text-anchor="middle" fill="#94a3b8" font-size="10">초안</text>

  <!-- Reviewer box -->
  <rect x="420" y="732" width="290" height="100" rx="12" fill="white" stroke="#c4b5fd" stroke-width="1.5"/>
  <rect x="420" y="732" width="290" height="34" rx="12" fill="#6d28d9"/>
  <rect x="420" y="752" width="290" height="14" rx="0" fill="#6d28d9"/>
  <text x="565" y="754" text-anchor="middle" fill="white" font-size="13" font-weight="700">🔍 Reviewer 에이전트</text>
  <text x="440" y="782" fill="#374151" font-size="11">• 7개 항목 0-100 연속 점수</text>
  <text x="440" y="798" fill="#374151" font-size="11">• Stage 1/2 사실 검증 · JD 매칭</text>
  <text x="440" y="814" fill="#374151" font-size="11">• AI 스타일 · 과장 · 오버 탐지</text>

  <!-- Feedback arrow Reviewer → Writer (back) -->
  <path d="M 420 840 Q 380 870 338 840" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="373" y="868" text-anchor="middle" fill="#94a3b8" font-size="10">피드백</text>

  <!-- Decision diamond -->
  <polygon points="380,876  444,906  380,936  316,906" fill="white" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="380" y="902" text-anchor="middle" fill="#5b21b6" font-size="10" font-weight="600">전 항목 ≥ 90점</text>
  <text x="380" y="916" text-anchor="middle" fill="#5b21b6" font-size="10" font-weight="600">AND 3회 이상?</text>

  <!-- No → back to Writer -->
  <line x1="316" y1="906" x2="193" y2="906" stroke="#f59e0b" stroke-width="1.5"/>
  <line x1="193" y1="906" x2="193" y2="832" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="254" y="900" text-anchor="middle" fill="#f59e0b" font-size="10">No → 재작성</text>

  <!-- Yes → Output -->
  <line x1="380" y1="936" x2="380" y2="958" stroke="#10b981" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="395" y="952" fill="#10b981" font-size="10" font-weight="600">Yes</text>

  <!-- Output -->
  <rect x="142" y="960" width="476" height="34" rx="10" fill="#064e3b"/>
  <text x="380" y="975" text-anchor="middle" fill="white" font-size="12" font-weight="600">✅ 최종 자소서</text>
  <text x="380" y="989" text-anchor="middle" fill="#6ee7b7" font-size="11">전체 개선 기록 (.md) 자동 생성 · 최고 점수 버전 제출</text>

</svg>
